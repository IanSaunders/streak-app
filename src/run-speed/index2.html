<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Pace & Speed</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #fc4c02;
      --orange-dark: #d93f00;
      --green: #16a34a;
      --red: #dc2626;
      --gray: #6b7280;
      --bg: #f9fafb;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }

    #app {
      max-width: 960px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }
    .app-header svg { color: var(--orange); flex-shrink: 0; }
    .app-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }
    .app-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      padding-left: 0.2rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .card-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      padding: 0.45rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { border-color: var(--orange); color: var(--orange); }
    .tab-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    /* ── Charts grid ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .chart-full { grid-column: 1 / -1; }

    .chart-container {
      position: relative;
      height: 260px;
    }

    /* ── Calculator ── */
    .calc-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .form-group input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(252,76,2,0.12);
    }
    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* ── Stat cards ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--orange);
      font-variant-numeric: tabular-nums;
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .stat-empty .stat-value { color: var(--border); }

    /* ── Presets ── */
    .preset-row {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .preset-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      align-self: center;
      margin-right: 0.25rem;
      white-space: nowrap;
    }
    .preset-btn {
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .preset-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: #fff7ed;
    }
    .preset-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    /* ── Insight ── */
    .insight-box {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 0.845rem;
      color: #7c2d12;
      line-height: 1.5;
      min-height: 2.5rem;
    }
    .insight-box.empty {
      color: var(--text-muted);
      background: var(--bg);
      border-color: var(--border);
    }

    /* ── Heatmap ── */
    .heatmap-wrap {
      overflow: auto;
      height: 100%;
      display: flex;
      align-items: center;
    }
    .heatmap-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
    }
    .heatmap-table th {
      padding: 0.3rem 0.4rem;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
    }
    .heatmap-table th.row-label { text-align: right; }
    .heat-subhead {
      display: block;
      font-size: 0.6rem;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 0.1rem;
    }
    .heatmap-table td {
      padding: 0.3rem 0.4rem;
      text-align: center;
      color: #fff;
      font-weight: 600;
      border-radius: 4px;
      white-space: nowrap;
    }
    .heatmap-table td.pace-label {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-align: right;
      padding-right: 0.6rem;
      background: none;
    }
    .heatmap-table tr.user-row td.pace-label {
      color: var(--orange);
      font-weight: 700;
    }
    .heatmap-table tr.user-row td:not(.pace-label) {
      outline: 2px solid var(--orange);
      outline-offset: -2px;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body { padding: 1rem; }
      .charts-grid { grid-template-columns: 1fr; }
      .calc-inputs { grid-template-columns: 1fr; }
      .stat-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

// ─── Constants & state ───
const DISTANCES = {
  mile: { label: 'Mile',      km: 1.60934,  minT: 210,   maxT: 1200,   step: 10,
    heatTimes: [240, 270, 300, 330, 360, 420, 480, 600],
    heatSaves: [10, 20, 30, 45, 60],
    presets: [
      { label: 'Sub-4', sec: 3*60+59 },
      { label: '5:00',  sec: 5*60 },
      { label: '6:00',  sec: 6*60 },
      { label: '7:00',  sec: 7*60 },
    ],
  },
  '5k': { label: '5K',       km: 5,        minT: 780,   maxT: 2700,   step: 15,
    heatTimes: [840, 1020, 1200, 1380, 1500, 1680, 1800, 2100],
    heatSaves: [30, 60, 90, 120, 180],
    presets: [
      { label: '15 min', sec: 15*60 },
      { label: '20 min', sec: 20*60 },
      { label: '25 min', sec: 25*60 },
      { label: '30 min', sec: 30*60 },
    ],
  },
  '10k': { label: '10K',     km: 10,       minT: 1620,  maxT: 5400,   step: 30,
    heatTimes: [1800, 2100, 2400, 2700, 3000, 3300, 3600, 4200],
    heatSaves: [60, 120, 180, 300, 600],
    presets: [
      { label: '35 min', sec: 35*60 },
      { label: '40 min', sec: 40*60 },
      { label: '50 min', sec: 50*60 },
      { label: '60 min', sec: 60*60 },
    ],
  },
  half: { label: 'Half',     km: 21.0975,  minT: 3600,  maxT: 12600,  step: 60,
    heatTimes: [3600, 4500, 5400, 6300, 7200, 8100, 9000, 10800],
    heatSaves: [60, 120, 300, 600, 900],
    presets: [
      { label: 'Sub-90', sec: 1*3600+29*60+59 },
      { label: '1:45',   sec: 1*3600+45*60 },
      { label: '2:00',   sec: 2*3600 },
      { label: '2:15',   sec: 2*3600+15*60 },
    ],
  },
  full: { label: 'Marathon',  km: 42.195,   minT: 7200,  maxT: 25200,  step: 120,
    heatTimes: [9000, 10800, 12600, 14400, 16200, 18000, 19800, 21600],
    heatSaves: [60, 300, 600, 900, 1800],
    presets: [
      { label: 'Sub-3', sec: 2*3600+59*60+59 },
      { label: '3:30',  sec: 3*3600+30*60 },
      { label: '4:00',  sec: 4*3600 },
      { label: '5:00',  sec: 5*3600 },
    ],
  },
  '50k': { label: '50K',     km: 50,       minT: 9000,  maxT: 43200,  step: 300,
    heatTimes: [10800, 12600, 14400, 16200, 18000, 21600, 25200, 28800],
    heatSaves: [120, 300, 600, 900, 1800],
    presets: [
      { label: 'Sub-4h', sec: 4*3600-1 },
      { label: '5h',     sec: 5*3600 },
      { label: '6h',     sec: 6*3600 },
      { label: '8h',     sec: 8*3600 },
    ],
  },
  '50m': { label: '50 Mile', km: 80.4672,  minT: 18000, maxT: 86400,  step: 600,
    heatTimes: [21600, 25200, 28800, 32400, 36000, 43200, 50400, 57600],
    heatSaves: [300, 600, 900, 1800, 3600],
    presets: [
      { label: 'Sub-7h', sec: 7*3600-1 },
      { label: '9h',     sec: 9*3600 },
      { label: '12h',    sec: 12*3600 },
      { label: '16h',    sec: 16*3600 },
    ],
  },
  '100m': { label: '100 Mile', km: 160.9344, minT: 43200, maxT: 172800, step: 1800,
    heatTimes: [50400, 57600, 64800, 72000, 86400, 100800, 115200, 144000],
    heatSaves: [1800, 3600, 7200, 10800, 21600],
    presets: [
      { label: 'Sub-14h', sec: 14*3600-1 },
      { label: '18h',     sec: 18*3600 },
      { label: '24h',     sec: 24*3600 },
      { label: '30h',     sec: 30*3600 },
    ],
  },
};

let activeDistance = 'full';
let chartInstances = {};  // { chart1, chart2, chart3 }
let userTime = null;      // seconds or null
let isUpdatingFromCalc = false;
let debounceTimer = null;

// ─── Math functions ───
function speedForPace(paceSec) { return 3600 / paceSec; }
function paceForSpeed(speedKmh) { return 3600 / speedKmh; }
function dvForTimeSaving(distKm, T, dt) { return 3600 * distKm * dt / (T * (T - dt)); }

function heatColor(pct) {
  // Fixed scale: 0% = green, 15%+ = dark red
  const t = Math.min(pct / 15, 1);
  let r, g, b;
  if (t <= 0.5) {
    const s = t * 2;
    r = Math.round(22  + (234 - 22)  * s);
    g = Math.round(163 + (88  - 163) * s);
    b = Math.round(74  + (12  - 74)  * s);
  } else {
    const s = (t - 0.5) * 2;
    r = Math.round(234 + (185 - 234) * s);
    g = Math.round(88  + (28  - 88)  * s);
    b = Math.round(12  + (28  - 12)  * s);
  }
  return `rgb(${r},${g},${b})`;
}

function formatSave(sec) {
  if (sec < 60)   return `−${sec}s`;
  if (sec < 3600) return `−${sec / 60} min`;
  const h = Math.floor(sec / 3600);
  const m = (sec % 3600) / 60;
  return m ? `−${h}h ${m}m` : `−${h}h`;
}

// ─── Formatting ───
function formatPace(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatTime(sec) {
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) {
    return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }
  return `${m}:${String(s).padStart(2, '0')}`;
}

function parseTimeInput(str) {
  if (!str || !str.trim()) return null;
  str = str.trim();
  // H:MM:SS or HH:MM:SS
  let m = str.match(/^(\d+):(\d{1,2}):(\d{2})$/);
  if (m) {
    const h = parseInt(m[1], 10);
    const min = parseInt(m[2], 10);
    const s = parseInt(m[3], 10);
    if (min >= 60 || s >= 60) return null;
    return h * 3600 + min * 60 + s;
  }
  // MM:SS
  m = str.match(/^(\d+):(\d{2})$/);
  if (m) {
    const min = parseInt(m[1], 10);
    const s = parseInt(m[2], 10);
    if (s >= 60) return null;
    return min * 60 + s;
  }
  return null;
}

function parsePaceInput(str) {
  if (!str || !str.trim()) return null;
  str = str.trim().replace(/\/km$/i, '').trim();
  const m = str.match(/^(\d+):(\d{2})$/);
  if (!m) return null;
  const min = parseInt(m[1], 10);
  const s = parseInt(m[2], 10);
  if (s >= 60) return null;
  return min * 60 + s;
}

// ─── Data generation ───

function buildChart2Data(distKey) {
  const dist = DISTANCES[distKey];
  const labels = [];
  const data = [];
  for (let t = dist.minT; t <= dist.maxT; t += dist.step) {
    labels.push(t);
    data.push(dvForTimeSaving(dist.km, t, 60));
  }
  return { labels, data };
}

function buildChart3Data() {
  const labels = [];
  const data = [];
  for (let v = 2.0; v <= 26.01; v += 0.1) {
    const speed = Math.round(v * 10) / 10;
    labels.push(speed);
    data.push(paceForSpeed(speed));
  }
  return { labels, data };
}

function chart3RangeForDist(distKey) {
  const dist = DISTANCES[distKey];
  const speeds = dist.heatTimes.map(t => 3600 * dist.km / t);
  return {
    min: Math.max(2,  Math.floor(Math.min(...speeds)) - 1),
    max: Math.min(26, Math.ceil(Math.max(...speeds))  + 1),
  };
}

// ─── Chart creation ───
function renderHeatmap(highlightTimeSec) {
  const container = document.getElementById('chart1-container');
  if (!container) return;

  const dist = DISTANCES[activeDistance];
  const times = dist.heatTimes;
  const saves = dist.heatSaves;

  // Find closest finish-time row to user's time
  let closestRow = null;
  if (highlightTimeSec !== null) {
    let bestDiff = Infinity;
    times.forEach(t => {
      const d = Math.abs(t - highlightTimeSec);
      if (d < bestDiff) { bestDiff = d; closestRow = t; }
    });
  }

  // Column headers: show the time saving + pace improvement in sec/km
  const headerCells = saves.map(s => {
    const paceImprSec = s / dist.km;
    const paceLabel = paceImprSec < 10
      ? paceImprSec.toFixed(1) + 's/km'
      : Math.round(paceImprSec) + 's/km';
    return `<th>${formatSave(s)}<br><span class="heat-subhead">${paceLabel} faster</span></th>`;
  }).join('');

  const rows = times.map(rowTime => {
    const isHighlighted = closestRow === rowTime;
    const cells = saves.map(s => {
      const pct = (s / rowTime) * 100;
      const bg  = heatColor(pct);
      return `<td style="background:${bg}">${pct.toFixed(1)}%</td>`;
    }).join('');
    return `<tr class="${isHighlighted ? 'user-row' : ''}">
      <td class="pace-label">${formatTime(rowTime)}</td>${cells}
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="heatmap-wrap">
      <table class="heatmap-table">
        <thead><tr><th class="row-label">Finish time</th>${headerCells}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function createChart2(canvasId, distKey) {
  const { labels, data } = buildChart2Data(distKey);
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#16a34a',
        backgroundColor: 'rgba(22,163,74,0.10)',
        borderWidth: 2,
        fill: true,
        pointRadius: 0,
        tension: 0.3,
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => `Finish: ${formatTime(items[0].parsed.x)}`,
            label: (item) => `Speed gain: ${item.parsed.y.toFixed(4)} km/h`,
          }
        },
        annotation: { annotations: {} },
      },
      scales: {
        x: {
          type: 'linear',
          min: DISTANCES[distKey].minT,
          max: DISTANCES[distKey].maxT,
          ticks: {
            maxTicksLimit: 8,
            callback: (v) => formatTime(v),
            font: { size: 11 },
          },
          title: { display: true, text: 'Finish time', font: { size: 11 } },
        },
        y: {
          title: { display: true, text: 'Speed gain for −1 min (km/h)', font: { size: 11 } },
          ticks: { font: { size: 11 } },
        }
      }
    }
  });
}

function createChart3(canvasId) {
  const { labels, data } = buildChart3Data();
  const { min, max } = chart3RangeForDist(activeDistance);
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.08)',
        borderWidth: 2,
        fill: true,
        pointRadius: 0,
        tension: 0,
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => `Speed: ${items[0].parsed.x.toFixed(1)} km/h`,
            label: (item) => `Pace: ${formatPace(item.parsed.y)}/km`,
          }
        },
        annotation: { annotations: {} },
      },
      scales: {
        x: {
          type: 'linear',
          min,
          max,
          ticks: {
            stepSize: 1,
            callback: (v) => `${v}`,
            font: { size: 11 },
          },
          title: { display: true, text: 'Speed (km/h)', font: { size: 11 } },
        },
        y: {
          reverse: true,
          ticks: {
            callback: (v) => formatPace(v),
            font: { size: 11 },
          },
          title: { display: true, text: 'Pace (min/km)', font: { size: 11 } },
        }
      }
    }
  });
}

// ─── Chart updates ───
function updateChart3ForDistance(distKey) {
  const chart = chartInstances.chart3;
  if (!chart) return;
  const { min, max } = chart3RangeForDist(distKey);
  chart.options.scales.x.min = min;
  chart.options.scales.x.max = max;
  chart.update();
}

function updateChart2ForDistance(distKey) {
  const chart = chartInstances.chart2;
  if (!chart) return;
  const { labels, data } = buildChart2Data(distKey);
  chart.data.labels = labels;
  chart.data.datasets[0].data = data;
  chart.options.scales.x.min = DISTANCES[distKey].minT;
  chart.options.scales.x.max = DISTANCES[distKey].maxT;
  chart.update();
}

function updateAnnotations() {
  const chart2 = chartInstances.chart2;
  const chart3 = chartInstances.chart3;
  if (!chart2 || !chart3) return;

  // Heatmap: highlight closest finish-time row
  renderHeatmap(userTime);

  if (userTime !== null) {
    const dist = DISTANCES[activeDistance];
    const t    = userTime;

    // Chart 2: point at user's finish time
    if (t > dist.minT && t < dist.maxT) {
      chart2.options.plugins.annotation.annotations = {
        userTimePoint: {
          type: 'point',
          xValue: t,
          yValue: dvForTimeSaving(dist.km, t, 60),
          radius: 7,
          backgroundColor: 'rgba(22,163,74,0.85)',
          borderColor: '#fff',
          borderWidth: 2,
        }
      };
    } else {
      chart2.options.plugins.annotation.annotations = {};
    }

    // Chart 3: crosshair + point at user's speed/pace
    const userSpeed   = 3600 * dist.km / t;          // km/h
    const userPaceSec = t / dist.km;                  // sec/km
    chart3.options.plugins.annotation.annotations = {
      vLine: {
        type: 'line',
        xMin: userSpeed, xMax: userSpeed,
        borderColor: 'rgba(99,102,241,0.45)',
        borderWidth: 1.5,
        borderDash: [5, 4],
      },
      hLine: {
        type: 'line',
        yMin: userPaceSec, yMax: userPaceSec,
        borderColor: 'rgba(99,102,241,0.45)',
        borderWidth: 1.5,
        borderDash: [5, 4],
      },
      userPoint: {
        type: 'point',
        xValue: userSpeed,
        yValue: userPaceSec,
        radius: 7,
        backgroundColor: 'rgba(99,102,241,0.9)',
        borderColor: '#fff',
        borderWidth: 2,
        label: {
          display: true,
          content: `${formatPace(userPaceSec)}/km · ${userSpeed.toFixed(1)} km/h`,
          position: 'start',
          backgroundColor: 'rgba(99,102,241,0.9)',
          color: '#fff',
          font: { size: 10, weight: '600' },
          padding: { x: 6, y: 3 },
          xAdjust: 10,
          yAdjust: -14,
        },
      },
    };
  } else {
    chart2.options.plugins.annotation.annotations = {};
    chart3.options.plugins.annotation.annotations = {};
  }

  chart2.update();
  chart3.update();
}

// ─── Calculator ───
function onTimeInput() {
  if (isUpdatingFromCalc) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const val = document.getElementById('input-time').value;
    userTime = parseTimeInput(val);

    if (userTime !== null) {
      const dist = DISTANCES[activeDistance];
      const paceSec = userTime / dist.km;
      isUpdatingFromCalc = true;
      document.getElementById('input-pace').value = formatPace(paceSec);
      isUpdatingFromCalc = false;
    }

    renderPresets(activeDistance);
    renderCalcResult(activeDistance, userTime);
    updateAnnotations();
  }, 200);
}

function onPaceInput() {
  if (isUpdatingFromCalc) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const val = document.getElementById('input-pace').value;
    const paceSec = parsePaceInput(val);

    if (paceSec !== null) {
      const dist = DISTANCES[activeDistance];
      const totalSec = Math.round(paceSec * dist.km);
      userTime = totalSec;
      isUpdatingFromCalc = true;
      document.getElementById('input-time').value = formatTime(totalSec);
      isUpdatingFromCalc = false;
    } else {
      userTime = null;
    }

    renderPresets(activeDistance);
    renderCalcResult(activeDistance, userTime);
    updateAnnotations();
  }, 200);
}

// ─── Rendering ───
function renderApp() {
  const tabsHtml = Object.entries(DISTANCES).map(([key, d]) =>
    `<button class="tab-btn${key === activeDistance ? ' active' : ''}" data-dist="${key}">${d.label}</button>`
  ).join('');

  document.getElementById('app').innerHTML = `
    <div class="app-header">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <h1>Running Pace &amp; Speed</h1>
    </div>
    <p class="app-subtitle">Speed and pace have a hyperbolic relationship — the faster you run, the more effort each additional second costs.</p>

    <div class="tab-bar" id="tab-bar">${tabsHtml}</div>

    <div class="preset-row" id="preset-row"></div>

    <div class="charts-grid">
      <div class="card">
        <div class="card-title">Speed Cost of Pace Improvements</div>
        <div class="card-subtitle">% pace improvement needed — rows = your finish time, columns = time you want to save</div>
        <div class="chart-container" id="chart1-container"></div>
      </div>
      <div class="card">
        <div class="card-title" id="chart2-title">Speed Required to Save 1 Minute — <span id="chart2-dist-label">Marathon</span></div>
        <div class="card-subtitle">km/h increase needed to finish 60 seconds faster at each finish time</div>
        <div class="chart-container"><canvas id="chart2"></canvas></div>
      </div>
      <div class="card chart-full">
        <div class="card-title">Pace vs Speed — The Hyperbola</div>
        <div class="card-subtitle">Equal speed increments produce unequal pace improvements — the faster you go, the smaller the gain</div>
        <div class="chart-container"><canvas id="chart3"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Calculator</div>
      <div class="calc-inputs">
        <div class="form-group">
          <label for="input-time">Finish Time</label>
          <input type="text" id="input-time" placeholder="H:MM:SS or MM:SS" autocomplete="off" />
          <div class="form-hint">e.g. 3:30:00 for a marathon</div>
        </div>
        <div class="form-group">
          <label for="input-pace">Pace (per km)</label>
          <input type="text" id="input-pace" placeholder="MM:SS" autocomplete="off" />
          <div class="form-hint">Changing one updates the other</div>
        </div>
      </div>

      <div class="stat-row" id="stat-row">
        <div class="stat-card stat-empty">
          <div class="stat-value" id="stat-speed">—</div>
          <div class="stat-label">Speed (km/h)</div>
        </div>
        <div class="stat-card stat-empty">
          <div class="stat-value" id="stat-pace">—</div>
          <div class="stat-label">Pace (min/km)</div>
        </div>
        <div class="stat-card stat-empty">
          <div class="stat-value" id="stat-dv">—</div>
          <div class="stat-label">Speed gain for −1 min</div>
        </div>
      </div>

      <div class="insight-box empty" id="insight-text">
        Enter a finish time or pace above to see your personalised breakdown.
      </div>
    </div>
  `;
}

function renderPresets(distKey) {
  const row = document.getElementById('preset-row');
  if (!row) return;
  const presets = DISTANCES[distKey].presets;
  row.innerHTML = `<span class="preset-label">Presets:</span>` +
    presets.map(p =>
      `<button class="preset-btn${userTime === p.sec ? ' active' : ''}" data-sec="${p.sec}">${p.label}</button>`
    ).join('');
}

function applyPreset(sec) {
  userTime = sec;
  const dist = DISTANCES[activeDistance];
  const paceSec = sec / dist.km;
  isUpdatingFromCalc = true;
  document.getElementById('input-time').value = formatTime(sec);
  document.getElementById('input-pace').value = formatPace(paceSec);
  isUpdatingFromCalc = false;
  renderPresets(activeDistance);
  renderCalcResult(activeDistance, userTime);
  updateAnnotations();
}

function renderCalcResult(distKey, timeSec) {
  const dist = DISTANCES[distKey];

  const speedEl = document.getElementById('stat-speed');
  const paceEl = document.getElementById('stat-pace');
  const dvEl = document.getElementById('stat-dv');
  const insightEl = document.getElementById('insight-text');

  const cards = document.querySelectorAll('.stat-card');

  if (timeSec === null || timeSec <= 0) {
    speedEl.textContent = '—';
    paceEl.textContent = '—';
    dvEl.textContent = '—';
    cards.forEach(c => c.classList.add('stat-empty'));
    insightEl.textContent = 'Enter a finish time or pace above to see your personalised breakdown.';
    insightEl.classList.add('empty');
    return;
  }

  const paceSec = timeSec / dist.km;
  const speed = speedForPace(paceSec);
  let dv = null;
  if (timeSec > 60) {
    dv = dvForTimeSaving(dist.km, timeSec, 60);
  }

  speedEl.textContent = speed.toFixed(2);
  paceEl.textContent = formatPace(paceSec);
  dvEl.textContent = dv !== null ? dv.toFixed(4) : '—';

  cards.forEach(c => c.classList.remove('stat-empty'));

  // Insight text
  if (dv !== null) {
    // Compare to a 10% slower pace
    const slowerPaceSec = paceSec * 1.1;
    const slowerTime = slowerPaceSec * dist.km;
    const slowerDv = dvForTimeSaving(dist.km, slowerTime, 60);
    const ratio = (dv / slowerDv).toFixed(1);

    insightEl.innerHTML = `At your current ${dist.label} pace of <strong>${formatPace(paceSec)}/km</strong>, you need to increase your average speed by <strong>${dv.toFixed(4)} km/h</strong> to save 1 minute. At <strong>${formatPace(slowerPaceSec)}/km</strong> (10% slower), the same saving only costs <strong>${slowerDv.toFixed(4)} km/h</strong> — <strong>${ratio}×</strong> cheaper.`;
    insightEl.classList.remove('empty');
  } else {
    insightEl.textContent = 'Time too short to compute a 1-minute saving.';
    insightEl.classList.remove('empty');
  }
}

function initCharts() {
  renderHeatmap(null);
  chartInstances.chart2 = createChart2('chart2', activeDistance);
  chartInstances.chart3 = createChart3('chart3');
  renderPresets(activeDistance);
}

function attachEventListeners() {
  // Tab bar
  document.getElementById('tab-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    const distKey = btn.dataset.dist;
    if (distKey === activeDistance) return;

    activeDistance = distKey;

    // Update tab active state
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Update chart 2 label and data
    document.getElementById('chart2-dist-label').textContent = DISTANCES[distKey].label;
    updateChart2ForDistance(distKey);
    updateChart3ForDistance(distKey);

    // If pace input is filled, recompute time for new distance
    const paceInput = document.getElementById('input-pace').value;
    const paceSec = parsePaceInput(paceInput);
    if (paceSec !== null) {
      const totalSec = Math.round(paceSec * DISTANCES[distKey].km);
      userTime = totalSec;
      isUpdatingFromCalc = true;
      document.getElementById('input-time').value = formatTime(totalSec);
      isUpdatingFromCalc = false;
    } else {
      // If time input is filled, recompute pace for new distance
      const timeInput = document.getElementById('input-time').value;
      const t = parseTimeInput(timeInput);
      if (t !== null) {
        userTime = t;
        const newPace = t / DISTANCES[distKey].km;
        isUpdatingFromCalc = true;
        document.getElementById('input-pace').value = formatPace(newPace);
        isUpdatingFromCalc = false;
      }
    }

    renderPresets(activeDistance);
    renderCalcResult(activeDistance, userTime);
    updateAnnotations();
  });

  // Preset buttons
  document.getElementById('app').addEventListener('click', (e) => {
    const btn = e.target.closest('.preset-btn');
    if (!btn) return;
    applyPreset(parseInt(btn.dataset.sec, 10));
  });

  // Calculator inputs
  document.getElementById('input-time').addEventListener('input', onTimeInput);
  document.getElementById('input-pace').addEventListener('input', onPaceInput);
}

// ─── Main ───
function main() {
  renderApp();
  initCharts();
  attachEventListeners();
}

document.addEventListener('DOMContentLoaded', main);
</script>
</body>
</html>
